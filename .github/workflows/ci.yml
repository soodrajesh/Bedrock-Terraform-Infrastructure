name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform fmt / validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (no backend, no credentials)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    env:
      SHELLCHECK_VERSION: "0.11.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned ShellCheck
        run: |
          set -euo pipefail
          curl -sSLo /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo cp "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Run shellcheck on all shell scripts
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          files=(**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          echo "Checking: ${files[*]}"
          shellcheck "${files[@]}"

  checkov:
    name: Checkov (soft-fail, informational)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install checkov
        run: pip install checkov

      - name: Run checkov
        run: checkov -d . --compact --quiet --soft-fail
